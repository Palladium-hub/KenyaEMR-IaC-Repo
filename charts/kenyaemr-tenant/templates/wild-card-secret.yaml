apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-copy-wildcard-cert
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: copy-wildcard-cert
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  template:
    spec:
      serviceAccountName: default
      restartPolicy: OnFailure
      containers:
        - name: copy-secret
          image: bitnami/kubectl:latest
          command:
            - /bin/sh
            - -c
            - |
              if ! kubectl get secret hmislocal-wildcard-tls -n {{ .Release.Namespace }} >/dev/null 2>&1; then
                echo "Copying wildcard cert to {{ .Release.Namespace }}..."
                kubectl get secret hmislocal-wildcard-tls -n cert-manager -o yaml \
                  | sed "s/namespace: cert-manager/namespace: {{ .Release.Namespace }}/" \
                  | kubectl apply -f -
              else
                echo "Wildcard cert already exists in {{ .Release.Namespace }}. Skipping."
              fi
