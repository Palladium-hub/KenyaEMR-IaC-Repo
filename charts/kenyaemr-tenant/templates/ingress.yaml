apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-kenyaemr-ingress
  labels:
    app.kubernetes.io/name: {{ .Release.Name }}-kenyaemr
    app.kubernetes.io/instance: {{ .Release.Name }}
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
    alb.ingress.kubernetes.io/healthcheck-path: /openmrs
    alb.ingress.kubernetes.io/group.name: {{ .Values.tenant.name }}
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          - path: /openmrs/spa
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.tenant.name }}-frontend
                port:
                  number: 80
          - path: /openmrs
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.tenant.name }}-backend
                port:
                  number: 8080
