# templates/wildcard-cert-role.yaml
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: copy-wildcard-cert-role
  namespace: {{ .Release.Namespace }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "patch", "apply"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: copy-wildcard-cert-binding
  namespace: {{ .Release.Namespace }}
subjects:
  - kind: ServiceAccount
    name: default
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: copy-wildcard-cert-role
  apiGroup: rbac.authorization.k8s.io
