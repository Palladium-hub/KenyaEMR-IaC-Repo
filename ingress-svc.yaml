apiVersion: v1
kind: Service
metadata:
  name: nginx-ingress-microk8s-service
  namespace: ingress
spec:
  type: NodePort
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 31857
    - name: https
      port: 443
      targetPort: 443
      nodePort: 32443
  selector:
    name: nginx-ingress-microk8s
